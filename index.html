function b64(s){return Uint8Array.from(atob(s),c=>c.charCodeAt(0))}
async function unlock(pw){
  const enc=new TextEncoder();
  const km=await crypto.subtle.importKey("raw",enc.encode(pw),"PBKDF2",false,["deriveKey"]);
  const key=await crypto.subtle.deriveKey({name:"PBKDF2",salt:b64(DATA.salt),iterations:DATA.iter,hash:"SHA-256"},km,{name:"AES-GCM",length:256},false,["decrypt"]);
  const pt=await crypto.subtle.decrypt({name:"AES-GCM",iv:b64(DATA.iv)},key,b64(DATA.ct));
  const html=new TextDecoder().decode(pt);
  document.open();document.write(html);document.close();
}
document.getElementById("f").addEventListener("submit",async e=>{
  e.preventDefault();const pw=document.getElementById("pw").value;const er=document.getElementById("e");
  er.textContent="";try{await unlock(pw)}catch(x){er.textContent="Wrong password"}
});
